/* =====================================================================
   FORM DATA COLLECTION
   ===================================================================== */
function getFormData() {
    function selText(id) {
        const s = document.getElementById(id);
        return s.selectedIndex >= 0 ? s.options[s.selectedIndex].text : '';
    }
    function selOrCustom(selId, custId) {
        const s = document.getElementById(selId);
        if (s.value === 'custom') return document.getElementById(custId).value;
        return s.selectedIndex >= 0 && s.value !== '' ? s.options[s.selectedIndex].text : '';
    }
    function projectLocation() {
        const prov = document.getElementById('projectProvince').value;
        const city = document.getElementById('projectCity').value;
        if (prov && city) return prov + ' ' + city;
        if (prov) return prov;
        return '';
    }

    return {
        项目名称: document.getElementById('projectName').value,
        项目编号: document.getElementById('projectCode').value,
        项目地点: projectLocation(),
        发电模式: document.getElementById('generationMode').value,
        设计日期: document.getElementById('designDate').value,
        光伏可用面积: document.getElementById('availableArea').value ? document.getElementById('availableArea').value + ' m²' : '',
        规划装机容量: document.getElementById('installedCapacity').value ? document.getElementById('installedCapacity').value + ' kWp' : '',
        年预计发电量: document.getElementById('annualGeneration').value ? document.getElementById('annualGeneration').value + ' 万kWh' : '',
        组件型号: selOrCustom('moduleModel', 'moduleModelCustom'),
        组件类型: document.getElementById('moduleType').value,
        单块功率: document.getElementById('modulePower').value ? document.getElementById('modulePower').value + ' Wp' : '',
        组件尺寸: document.getElementById('moduleSize').value,
        组件数量: document.getElementById('moduleCount').value ? document.getElementById('moduleCount').value + ' 块' : '',
        组件效率: document.getElementById('moduleEfficiency').value ? document.getElementById('moduleEfficiency').value + ' %' : '',
        逆变器配置: collectInverterEntries().map((e, i) => { const mt = e.model === 'custom' ? e.modelCustom : (e.model !== '' && e.model !== 'none' ? (INVERTER_DB[parseInt(e.model)]?.brand || '') : (e.model === 'none' ? '无要求' : '')); return '#' + (i+1) + ' ' + (mt || '未选') + (e.power ? ' / ' + e.power + 'kW' : '') + (e.count ? ' x' + e.count + '台' : ''); }).join('; ') || '',
        支架类型: document.getElementById('bracketType').value,
        支架材质: document.getElementById('bracketMaterial').value,
        支架型号: selOrCustom('bracketModel', 'bracketModelCustom'),
        安装倾角: document.getElementById('tiltAngle').value ? document.getElementById('tiltAngle').value + ' °' : '',
        基础形式: document.getElementById('foundationType').value,
        电缆配置: collectCableEntries().map((e, i) => { const dc = e.dcCable !== '' ? (DC_CABLE_DB[parseInt(e.dcCable)]?.spec || '') : ''; const ac = e.acCable !== '' ? (AC_CABLE_DB[parseInt(e.acCable)]?.spec || '') : ''; return '#' + (i+1) + ' ' + ([dc, ac].filter(Boolean).join(' / ') || '未选') + (e.brand ? ' [' + e.brand + ']' : '') + (e.length ? ' ' + e.length + 'm' : ''); }).join('; ') || '',
        汇流箱型号: selOrCustom('combinerBox', 'combinerBoxCustom'),
        桥架线槽规格: selOrCustom('cableTray', 'cableTrayCustom'),
        防雷接地材料: document.getElementById('groundingMaterialsValue').value,
        其他辅材说明: document.getElementById('otherMaterials').value,
        备注: document.getElementById('remarks').value,
    };
}

/* =====================================================================
   VALIDATION
   ===================================================================== */
function validateForm() {
    const errors = [];
    if (!document.getElementById('projectName').value.trim()) errors.push('请填写项目名称');
    if (!document.getElementById('projectProvince').value) errors.push('请选择项目所在省份');
    if (!document.getElementById('generationMode').value) errors.push('请选择发电模式');
    if (errors.length > 0) {
        alert('请完善以下必填信息：\n' + errors.map(e => '• ' + e).join('\n'));
        return false;
    }
    return true;
}

/* =====================================================================
   PDF EXPORT
   ===================================================================== */
function exportPDF() {
    if (!validateForm()) return;
    const now = new Date();
    document.getElementById('printDate').textContent =
        '打印日期：' + now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
    document.title = '光伏项目信息表 - ' + (document.getElementById('projectName').value || '未命名项目');
    setStatus('正在准备打印...', 'success');
    setTimeout(() => window.print(), 300);
}

/* =====================================================================
   DRAFT SAVE / LOAD
   ===================================================================== */
function saveDraft() {
    saveDraftAsync();
}

async function saveDraftAsync() {
    const raw = collectRawData();
    const result = await apiCall('/api/draft', {
        method: 'PUT',
        body: JSON.stringify({ rawData: raw })
    });
    if (result === null) {
        localStorage.setItem(userStorageKey('pv_project_draft'), JSON.stringify(raw));
    }
    setStatus('草稿已保存 (' + new Date().toLocaleTimeString() + ')', 'success');
}

function loadDraft() {
    loadDraftAsync();
}

async function loadDraftAsync() {
    const result = await apiCall('/api/draft');
    let d = null;
    if (result !== null && result.rawData) {
        d = result.rawData;
    } else if (result === null) {
        const raw = localStorage.getItem(userStorageKey('pv_project_draft'));
        if (raw) {
            try { d = JSON.parse(raw); } catch (e) {}
        }
    }
    if (!d) { setStatus('没有找到已保存的草稿', 'error'); return; }
    restoreRawData(d);
    setStatus('草稿已恢复 (' + new Date().toLocaleTimeString() + ')', 'success');
}

/* =====================================================================
   CLEAR FORM
   ===================================================================== */
function clearForm() {
    if (!confirm('确定要清空所有已填写的内容吗？此操作不可撤销。')) return;
    document.querySelectorAll('input[type="text"], input[type="number"], input[type="date"], textarea').forEach(el => el.value = '');
    document.querySelectorAll('select').forEach(el => el.selectedIndex = 0);
    document.querySelectorAll('.custom-input').forEach(el => { el.classList.remove('show'); el.value = ''; });
    document.querySelectorAll('#groundingMaterials input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.getElementById('groundingMaterialsValue').value = '';
    document.getElementById('projectCity').innerHTML = '<option value="">-- 市/区 --</option>';
    document.getElementById('moduleCountBadge').classList.remove('show');
    // Reset dynamic entries
    restoreInverterEntries([]);
    restoreCableEntries([]);
    currentProjectId = null;
    updateProjectSelector();
    setStatus('表单已清空', '');
}

/* =====================================================================
   PROJECT MANAGEMENT — Multi-project CRUD (API-first + localStorage fallback)
   ===================================================================== */
let currentProjectId = null;

async function getProjects() {
    const data = await apiCall('/api/projects');
    if (data !== null) return data;
    // Fallback: localStorage
    return getProjectsLocal();
}

function saveProjects(arr) {
    // Only used for localStorage fallback
    saveProjectsLocal(arr);
}

function collectRawData() {
    const raw = {};
    const ids = ['projectName','projectCode','projectProvince','projectCity','generationMode','designDate',
        'availableArea','installedCapacity','annualGeneration',
        'moduleModel','moduleModelCustom','moduleType','modulePower','moduleSize','moduleCount','moduleEfficiency',
        'bracketType','bracketMaterial','bracketModel','bracketModelCustom','tiltAngle','foundationType',
        'combinerBox','combinerBoxCustom','cableTray','cableTrayCustom',
        'otherMaterials','remarks'];
    ids.forEach(id => { raw[id] = document.getElementById(id).value; });
    raw.groundingCheckboxes = Array.from(document.querySelectorAll('#groundingMaterials input[type="checkbox"]:checked')).map(cb => cb.value);
    raw.inverterEntries = collectInverterEntries();
    raw.cableEntries = collectCableEntries();
    return raw;
}

function restoreRawData(d) {
    Object.keys(d).forEach(key => {
        if (key === 'groundingCheckboxes') {
            document.querySelectorAll('#groundingMaterials input[type="checkbox"]').forEach(cb => {
                cb.checked = (d.groundingCheckboxes || []).includes(cb.value);
            });
            updateGroundingField();
        } else if (key === 'inverterEntries') {
            restoreInverterEntries(d[key]);
        } else if (key === 'cableEntries') {
            restoreCableEntries(d[key]);
        } else if (key === 'projectProvince') {
            const el = document.getElementById(key);
            if (el) { el.value = d[key] || ''; onProvinceChange(); }
        } else if (key !== 'projectCity') {
            const el = document.getElementById(key);
            if (el) el.value = d[key] || '';
        }
    });
    // Restore city after province change populates the city dropdown
    if (d.projectCity) {
        setTimeout(() => {
            const cityEl = document.getElementById('projectCity');
            if (cityEl) cityEl.value = d.projectCity;
        }, 60);
    }
    // Show custom inputs if needed
    ['moduleModel','bracketModel','combinerBox','cableTray'].forEach(id => {
        if (d[id] === 'custom') {
            const ci = document.getElementById(id + 'Custom');
            if (ci) ci.classList.add('show');
        }
    });
}

function saveProject() {
    if (!document.getElementById('projectName').value.trim()) {
        setStatus('请先填写项目名称再保存', 'error');
        return;
    }
    const raw = collectRawData();
    saveProjectAsync(raw);
}

async function saveProjectAsync(raw) {
    const projectData = {
        id: currentProjectId || null,
        name: raw.projectName,
        location: (raw.projectProvince || '') + (raw.projectCity ? ' ' + raw.projectCity : ''),
        generationMode: raw.generationMode,
        rawData: raw
    };

    const result = await apiCall('/api/projects', {
        method: 'POST',
        body: JSON.stringify(projectData)
    });

    if (result !== null) {
        if (!currentProjectId && result.id) {
            currentProjectId = result.id;
        }
    } else {
        // Fallback to localStorage
        const projectId = saveProjectLocal(raw, currentProjectId);
        if (!currentProjectId) currentProjectId = projectId;
    }

    renderProjectList();
    updateProjectSelector();
    setStatus('项目「' + raw.projectName + '」已保存', 'success');
}

function loadProject(id) {
    loadProjectAsync(id);
}

async function loadProjectAsync(id) {
    // Try API first
    let project = null;
    const data = await apiCall('/api/projects');
    if (data !== null) {
        project = data.find(p => p.id === id);
    }
    if (!project) {
        // Fallback to localStorage
        project = getProjectsLocal().find(p => p.id === id);
    }
    if (!project) { setStatus('项目未找到', 'error'); return; }

    currentProjectId = id;
    restoreRawData(project.rawData);
    renderProjectList();
    updateProjectSelector();
    setStatus('已加载项目「' + project.name + '」', 'success');
}

function deleteProject(id) {
    deleteProjectAsync(id);
}

async function deleteProjectAsync(id) {
    // Get project name for confirmation
    let name = '';
    const data = await apiCall('/api/projects');
    if (data !== null) {
        const p = data.find(p => p.id === id);
        name = p ? p.name : '';
    }
    if (!name) {
        const p = getProjectsLocal().find(p => p.id === id);
        name = p ? p.name : '';
    }
    if (!confirm('确定要删除项目「' + name + '」吗？此操作不可撤销。')) return;

    const result = await apiCall('/api/projects/' + encodeURIComponent(id), { method: 'DELETE' });
    if (result === null) {
        deleteProjectLocal(id);
    }

    if (currentProjectId === id) {
        currentProjectId = null;
        clearForm();
    }

    renderProjectList();
    updateProjectSelector();
    setStatus('项目「' + name + '」已删除', '');
}

function deleteCurrentProject() {
    if (!currentProjectId) { setStatus('请先选择或加载一个项目', 'error'); return; }
    deleteProject(currentProjectId);
}

function newProject() {
    if (currentProjectId && document.getElementById('projectName').value.trim()) {
        if (!confirm('当前表单有未保存的内容，确定要新建项目吗？建议先保存当前项目。')) return;
    }
    currentProjectId = null;
    clearForm();
    renderProjectList();
    updateProjectSelector();
    setStatus('已创建新项目，请填写信息后保存', '');
    document.getElementById('projectName').focus();
}

function onProjectSearch() {
    const query = document.getElementById('projectSearch').value.trim().toLowerCase();
    renderProjectList(query);
    if (query) {
        document.getElementById('projectListWrap').classList.add('open');
    }
}

function onProjectSelectorChange() {
    const id = document.getElementById('projectSelector').value;
    if (id) {
        if (currentProjectId && document.getElementById('projectName').value.trim() &&
            id !== currentProjectId &&
            !confirm('切换项目将丢失当前未保存的修改。确定切换吗？')) {
            updateProjectSelector();
            return;
        }
        loadProject(id);
    }
}

function toggleProjectList() {
    const wrap = document.getElementById('projectListWrap');
    wrap.classList.toggle('open');
    if (wrap.classList.contains('open')) {
        renderProjectList();
    }
}

function updateProjectSelector() {
    updateProjectSelectorAsync();
}
async function updateProjectSelectorAsync() {
    const sel = document.getElementById('projectSelector');
    const projects = await getProjects();
    sel.innerHTML = '<option value="">-- 未选择项目 --</option>';
    projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name + (p.location ? ' | ' + p.location : '');
        if (p.id === currentProjectId) opt.selected = true;
        sel.appendChild(opt);
    });
}

function renderProjectList(filter) {
    renderProjectListAsync(filter);
}
async function renderProjectListAsync(filter) {
    const projects = await getProjects();
    const listEl = document.getElementById('projectList');
    const countEl = document.getElementById('projectCount');
    const noEl = document.getElementById('noProjects');

    let filtered = projects;
    if (filter) {
        const f = filter.toLowerCase();
        filtered = projects.filter(p =>
            (p.name || '').toLowerCase().includes(f) ||
            (p.location || '').toLowerCase().includes(f) ||
            (p.generationMode || '').toLowerCase().includes(f)
        );
    }

    countEl.textContent = '共 ' + filtered.length + ' 个项目' + (filter ? '（已过滤）' : '');

    if (filtered.length === 0) {
        listEl.innerHTML = '';
        noEl.style.display = 'block';
        return;
    }

    noEl.style.display = 'none';
    listEl.innerHTML = filtered.map(p => {
        const isActive = p.id === currentProjectId;
        const date = new Date(p.updatedAt || p.createdAt);
        const dateStr = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
        return `
            <div class="project-item${isActive ? ' active' : ''}" onclick="loadProject('${p.id}')">
                <div class="pi-info">
                    <div class="pi-name">${escapeHTML(p.name) || '未命名项目'}</div>
                    <div class="pi-meta">
                        ${p.location ? '<span>📍 ' + escapeHTML(p.location) + '</span>' : ''}
                        ${p.generationMode ? '<span>⚡ ' + escapeHTML(p.generationMode) + '</span>' : ''}
                        <span>🕐 ${dateStr}</span>
                    </div>
                </div>
                <div class="pi-actions">
                    <button class="pi-btn pi-load" onclick="event.stopPropagation();loadProject('${p.id}')">加载</button>
                    <button class="pi-btn pi-del" onclick="event.stopPropagation();deleteProject('${p.id}')">删除</button>
                </div>
            </div>
        `;
    }).join('');
}

function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

/* =====================================================================
   STATUS TOAST
   ===================================================================== */
function setStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status ' + type;
    if (msg) setTimeout(() => { el.textContent = ''; el.className = 'status'; }, 4000);
}

/* =====================================================================
   KEYBOARD SHORTCUTS
   ===================================================================== */
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveDraft(); }
});

/* =====================================================================
   AUTH MODULE — API-first with localStorage fallback
   ===================================================================== */
const USERS_KEY       = 'pv_users';
const CURRENT_USER_KEY = 'pv_current_user';

function userStorageKey(base) {
    const user = getCurrentUser();
    return user ? base + '__' + user.username : base;
}

// --- Session management ---
function getCurrentUser() {
    // Check localStorage first (works offline + stores session)
    const local = getCurrentUserLocal();
    if (local) return local;
    // Also check authToken and decode if possible
    if (authToken) {
        try {
            const payload = JSON.parse(atob(authToken.split('.')[1]));
            return { username: payload.username };
        } catch (e) { return null; }
    }
    return null;
}
function setCurrentUser(user) {
    if (user) {
        localStorage.setItem(CURRENT_USER_KEY, JSON.stringify({
            username: user.username,
            loginTime: Date.now()
        }));
    } else {
        localStorage.removeItem(CURRENT_USER_KEY);
    }
}

// --- Validation ---
function isValidUsername(username) {
    if (!username || username.length < 3 || username.length > 20) return false;
    if (!/^[a-zA-Z一-龥]/.test(username)) return false;
    return /^[a-zA-Z0-9_一-龥]+$/.test(username);
}
function isValidPassword(password) {
    return password && password.length >= 6;
}

// --- Register (API-first) ---
let authSubmitting = false;
async function register(username, password, passwordConfirm) {
    if (!isValidUsername(username)) {
        throw new Error('用户名需3-20个字符，字母或中文开头，可含数字和下划线');
    }
    if (!isValidPassword(password)) {
        throw new Error('密码长度至少6位');
    }
    if (password !== passwordConfirm) {
        throw new Error('两次密码输入不一致');
    }

    const data = await apiCall('/api/auth/register', {
        method: 'POST',
        body: JSON.stringify({ username, password })
    });

    authToken = data.token;
    localStorage.setItem('pv_auth_token', authToken);
    setCurrentUser({ username: data.username });
    updateAuthUI();
}

// --- Login (API-first) ---
async function login(username, password) {
    if (!username || !password) {
        throw new Error('用户名和密码不能为空');
    }

    const data = await apiCall('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ username, password })
    });

    authToken = data.token;
    localStorage.setItem('pv_auth_token', authToken);
    setCurrentUser({ username: data.username });
    updateAuthUI();
}

// --- Logout ---
function logout() {
    if (currentProjectId && document.getElementById('projectName').value.trim()) {
        if (!confirm('您当前有未保存的项目内容，确定要退出登录吗？建议先保存项目。')) return;
    }
    authToken = null;
    localStorage.removeItem('pv_auth_token');
    setCurrentUser(null);
    currentProjectId = null;
    clearForm();
    updateProjectSelector();
    renderProjectList();
    updateAuthUI();
    setStatus('已退出登录', '');
}

// --- Modal UI ---
function openAuthModal() {
    document.getElementById('authOverlay').classList.add('open');
    switchAuthTab('login');
    clearAuthErrors();
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('registerUsername').value = '';
    document.getElementById('registerPassword').value = '';
    document.getElementById('registerPasswordConfirm').value = '';
    setTimeout(() => document.getElementById('loginUsername').focus(), 150);
}
function closeAuthModal() {
    document.getElementById('authOverlay').classList.remove('open');
}
function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.auth-tab-panel').forEach(p => p.classList.toggle('active', p.id === tab + 'Panel'));
    document.getElementById('authSubmitBtn').textContent = (tab === 'login') ? '登录' : '注册';
    clearAuthErrors();
    const activePanel = document.getElementById(tab + 'Panel');
    const firstInput = activePanel.querySelector('input');
    if (firstInput) setTimeout(() => firstInput.focus(), 100);
}

// --- Submit handler ---
async function handleAuthSubmit() {
    if (authSubmitting) return;
    const activeTab = document.querySelector('.auth-tab.active').dataset.tab;
    clearAuthErrors();
    authSubmitting = true;
    try {
        if (activeTab === 'login') {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            await login(username, password);
            closeAuthModal();
            updateProjectSelector();
            renderProjectList();
            const draftKey = userStorageKey('pv_project_draft');
            if (localStorage.getItem(draftKey)) {
                setStatus('检测到已保存的草稿，点击"恢复草稿"加载', '');
            }
            setStatus('欢迎回来，' + username + '！', 'success');
        } else {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
            await register(username, password, passwordConfirm);
            closeAuthModal();
            updateProjectSelector();
            renderProjectList();
            setStatus('注册成功，欢迎您，' + username + '！', 'success');
        }
    } catch (e) {
        if (activeTab === 'login') {
            document.getElementById('loginError').textContent = e.message;
        } else {
            document.getElementById('registerError').textContent = e.message;
        }
    } finally {
        authSubmitting = false;
    }
}

function clearAuthErrors() {
    document.getElementById('loginError').textContent = '';
    document.getElementById('registerError').textContent = '';
}

// --- Toolbar auth area ---
function updateAuthUI() {
    const authArea = document.getElementById('authArea');
    const currentUser = getCurrentUser();
    if (currentUser) {
        authArea.innerHTML =
            '<span class="user-badge">' +
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' +
            escapeHTML(currentUser.username) +
            '</span>' +
            '<button class="btn-auth btn-auth-logout" onclick="logout()" title="退出登录">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>' +
            '退出</button>';
    } else {
        authArea.innerHTML =
            '<button class="btn-auth" onclick="openAuthModal()">' +
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>' +
            '登录</button>' +
            '<button class="btn-auth" onclick="openAuthModal();switchAuthTab(\'register\')">' +
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>' +
            '注册</button>';
    }
}

function updateConnectionIndicator() {
    const dot = document.getElementById('connectionDot');
    if (!dot) return;
    if (serverOnline) {
        dot.style.background = 'var(--green-500)';
        dot.title = '服务器已连接';
    } else {
        dot.style.background = 'var(--gray-400)';
        dot.title = '离线模式 — 数据保存在本地';
    }
}

function checkServerConnection() {
    checkServerConnectionAsync();
}
async function checkServerConnectionAsync() {
    try {
        const resp = await fetch(API_BASE_URL + '/api/ping');
        if (resp.ok) {
            serverOnline = true;
            updateConnectionIndicator();
            // Show migration button if user is logged in and there's local data to migrate
            updateMigrationButton();
        }
    } catch (e) {
        serverOnline = false;
        updateConnectionIndicator();
    }
}

function updateMigrationButton() {
    const btn = document.getElementById('btnMigrate');
    if (!btn) return;
    const user = getCurrentUser();
    if (serverOnline && user) {
        const localProjects = getProjectsLocal();
        if (localProjects.length > 0) {
            btn.style.display = 'inline-flex';
            return;
        }
    }
    btn.style.display = 'none';
}

async function migrateData() {
    if (!confirm('将本地 localStorage 中的项目数据迁移到服务器？迁移后数据将可在多设备间同步。\n\n（本地数据不会被删除）')) return;

    const projects = getProjectsLocal();
    const draftKey = userStorageKey('pv_project_draft');
    const draftRaw = localStorage.getItem(draftKey);
    const draft = draftRaw ? JSON.parse(draftRaw) : null;

    const result = await apiCall('/api/migrate', {
        method: 'POST',
        body: JSON.stringify({ projects, draft })
    });

    if (result === null) {
        setStatus('迁移失败：无法连接到服务器', 'error');
        return;
    }

    setStatus('迁移完成：导入了 ' + result.count + ' 个项目' + (result.draftMigrated ? ' 和1份草稿' : ''), 'success');
    updateMigrationButton();
    renderProjectList();
    updateProjectSelector();
}

// Click overlay to close modal
document.addEventListener('click', function(e) {
    if (e.target.id === 'authOverlay') closeAuthModal();
});

// Esc to close modal
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('authOverlay').classList.contains('open')) {
        closeAuthModal();
    }
    if (e.key === 'Enter' && document.getElementById('authOverlay').classList.contains('open')) {
        e.preventDefault();
        handleAuthSubmit();
    }
});

/* =====================================================================
   BOOT
   ===================================================================== */
window.addEventListener('DOMContentLoaded', function() {
    initSelects();
    const today = new Date();
    document.getElementById('designDate').value =
        today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

    // Init auth UI
    updateAuthUI();

    // Init dynamic entries (1 empty each)
    addInverterEntry();
    addCableEntry();

    // Check server connection & restore session
    checkServerConnection();

    // Restore token from localStorage if present
    if (localStorage.getItem('pv_auth_token')) {
        authToken = localStorage.getItem('pv_auth_token');
    }

    // Init project management
    updateProjectSelector();
    renderProjectList();

    // Check for saved draft
    setTimeout(async () => {
        const draftResult = await apiCall('/api/draft');
        if (draftResult !== null && draftResult.rawData) {
            setStatus('检测到服务器端已保存的草稿，点击"恢复草稿"加载', '');
        } else {
            const draftKey = userStorageKey('pv_project_draft');
            if (localStorage.getItem(draftKey)) {
                setStatus('检测到本地已保存的草稿，点击"恢复草稿"加载', '');
            }
        }
    }, 500);
});
